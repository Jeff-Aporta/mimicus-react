<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mimicus React — Jeff-Aporta</title>
  <meta name="description" content="Mimicus React — biblioteca UI React personal: AppLayout, Button, Card y navegación SPA por CDN. Sin MUI." />
  <meta name="application-name" content="Mimicus React" />
  <meta name="theme-color" content="#1e90ff" />
  <meta name="app-theme-ls-key" content="mimicus:theme" />
  <meta name="app-icon" content="assets/mimicus-logo.svg" />
  <link rel="icon" href="assets/mimicus-logo.svg" type="image/svg+xml" />
  <script>
    (function () {
      var k = "mimicus:theme";
      var m = "dark";
      try {
        var v = localStorage.getItem(k);
        if (v === "light" || v === "dark") m = v;
      } catch (e) { /* ignore */ }
      document.documentElement.setAttribute("data-luminance", m);
      document.documentElement.style.colorScheme = m;
    })();
  </script>
  <script>
    (function () {
      var path = location.pathname.replace(/\/index\.html$/, "/");
      if (!path.endsWith("/")) path = path.replace(/[^/]+$/, "");
      if (path && path !== "/" && !document.querySelector("base")) {
        var b = document.createElement("base");
        b.href = path;
        document.head.appendChild(b);
      }
    })();
  </script>
  <script>window.__MIMICUS_UI_DIST__ = true;</script>
  <script src="cdn/iife/mimicus-snippets.min.js"></script>
  <script>
    MimicusBootstrap.loadCDNs("stack-esm");
  </script>
  <link rel="stylesheet" href="css/demo.css" />
  <script type="module" src="js/boot/loader.mjs"></script>
</head>
<body>
                                                                                                                                                            <div id="root">
    <style>
    html{color-scheme:dark;background:#0b1220}
        html[data-luminance="light"]{color-scheme:light;background:#f0f6ff}
        body{margin:0;height:100%;background:inherit}
        #root{height:100%;min-height:100vh}
        .mimicus-app-boot{height:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;font-family:"IBM Plex Sans", system-ui, sans-serif;background:#0b1220;color:#94a3b8}
        html[data-luminance="light"] .mimicus-app-boot{background:#f0f6ff;color:#64748b}
        .mimicus-app-boot__mesh{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 90% 55% at 15% -8%, rgba(99, 102, 241, 0.22), transparent 52%), radial-gradient(ellipse 70% 45% at 92% 5%, rgba(0, 229, 255, 0.1), transparent 48%), radial-gradient(ellipse 50% 30% at 50% 100%, rgba(30, 144, 255, 0.08), transparent 55%)}
        html[data-luminance="light"] .mimicus-app-boot__mesh{background:radial-gradient(ellipse 90% 55% at 15% -8%, rgba(30, 144, 255, 0.14), transparent 52%), radial-gradient(ellipse 70% 45% at 92% 5%, rgba(99, 102, 241, 0.08), transparent 48%)}
        .mimicus-app-boot__card{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:0.55rem;padding:1.65rem 2rem 1.45rem;min-width:min(17.5rem, 88vw);max-width:22rem;border-radius:14px;border:1px solid rgba(0, 229, 255, 0.24);background:linear-gradient(165deg, rgba(11, 18, 32, 0.94), rgba(15, 23, 42, 0.82));box-shadow:0 0 0 1px rgba(30, 144, 255, 0.08), 0 10px 36px rgba(30, 144, 255, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.05);text-align:center}
        html[data-luminance="light"] .mimicus-app-boot__card{border-color:rgba(30, 144, 255, 0.2);background:linear-gradient(165deg, rgba(255, 255, 255, 0.98), rgba(240, 247, 255, 0.92));box-shadow:0 8px 28px rgba(30, 144, 255, 0.1)}
        .mimicus-app-boot__icon-wrap{display:flex;align-items:center;justify-content:center;width:3.1rem;height:3.1rem;margin-bottom:0.15rem;border-radius:12px;border:1px solid rgba(0, 229, 255, 0.38);background:rgba(14, 165, 233, 0.12);box-shadow:0 0 18px rgba(0, 229, 255, 0.16);color:#7dd3fc;animation:mimicus-boot-icon-pulse 2.4s ease-in-out infinite}
        html[data-luminance="light"] .mimicus-app-boot__icon-wrap{border-color:rgba(30, 144, 255, 0.28);background:rgba(224, 242, 254, 0.95);color:#0369a1;box-shadow:0 0 14px rgba(30, 144, 255, 0.12)}
        .mimicus-app-boot__title{margin:0;font-size:1.05rem;font-weight:700;letter-spacing:0.02em;color:#e2e8f0;line-height:1.25}
        html[data-luminance="light"] .mimicus-app-boot__title{color:#0f172a}
        .mimicus-app-boot__label{margin:0;font-size:0.82rem;font-weight:500;color:#94a3b8;line-height:1.35}
        html[data-luminance="light"] .mimicus-app-boot__label{color:#64748b}
        .mimicus-app-boot__bar{width:100%;height:3px;margin-top:0.45rem;border-radius:999px;background:rgba(148, 163, 184, 0.2);overflow:hidden}
        html[data-luminance="light"] .mimicus-app-boot__bar{background:rgba(148, 163, 184, 0.28)}
        .mimicus-app-boot__bar-fill{display:block;height:100%;width:36%;border-radius:inherit;background:linear-gradient(90deg, #1e90ff, #6366f1, #00e5ff);box-shadow:0 0 10px rgba(30, 144, 255, 0.4);animation:mimicus-boot-bar-slide 1.75s ease-in-out infinite}
        .mimicus-app-boot-watermark{position:fixed;right:1.25rem;bottom:1.25rem;width:min(100px, 16vw);height:auto;opacity:0.16;filter:grayscale(1) brightness(1.15);pointer-events:none;user-select:none;z-index:0}
        html[data-luminance="light"] .mimicus-app-boot-watermark{opacity:0.12;filter:grayscale(1) brightness(0.85)}
        @keyframes mimicus-boot-icon-pulse{0%, 100%{transform:translateY(0);box-shadow:0 0 18px rgba(0, 229, 255, 0.16)}50%{transform:translateY(-2px);box-shadow:0 0 26px rgba(0, 229, 255, 0.28)}}
        @keyframes mimicus-boot-bar-slide{0%{transform:translateX(-130%)}100%{transform:translateX(330%)}}
        @media (prefers-reduced-motion: reduce){.mimicus-app-boot__icon-wrap, .mimicus-app-boot__bar-fill{animation:none !important}}
    </style>
    <div class="mimicus-app-boot">
      <div class="mimicus-app-boot__mesh" aria-hidden="true"></div>
      <div class="mimicus-app-boot__card" role="status" aria-live="polite" aria-busy="true">
        <div class="mimicus-app-boot__icon-wrap">
          <img id="mimicus-boot-icon" src="assets/mimicus-logo.svg" alt="" width="42" height="42" decoding="async" />
        </div>
        <p class="mimicus-app-boot__title" id="mimicus-boot-title">Mimicus React</p>
        <p class="mimicus-app-boot__label" id="mimicus-boot-label">Cargando Mimicus React…</p>
            <script>
          (function () {
            try {
              var raw = new URLSearchParams(location.search).get("conn");
              if (!raw) return;
              var pad = String(raw).replace(/-/g, "+").replace(/_/g, "/");
              while (pad.length % 4) pad += "=";
              var bin = atob(pad);
              var bytes = new Uint8Array(bin.length);
              for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
              var conn = JSON.parse(new TextDecoder().decode(bytes));
              if (!conn || typeof conn !== "object") return;
              var t = conn.title || conn.name || conn.appName || (conn.brand && conn.brand.title);
              var ic = conn.icon || (conn.brand && conn.brand.icon);
              if (!t && !ic) return;
              globalThis.__MIMICUS_CONN__ = conn;
              var titleEl = document.getElementById("mimicus-boot-title");
              var labelEl = document.getElementById("mimicus-boot-label");
              var iconEl = document.getElementById("mimicus-boot-icon");
              if (t && titleEl) {
                titleEl.textContent = String(t);
                if (labelEl) labelEl.textContent = "Cargando " + String(t) + "\u2026";
                document.title = String(t);
                var appName = document.querySelector('meta[name="application-name"]');
                if (appName) appName.setAttribute("content", String(t));
                var og = document.querySelector('meta[property="og:title"]');
                if (og) og.setAttribute("content", String(t));
              }
              if (ic && iconEl) {
                if (iconEl.tagName === "ICONIFY-ICON") iconEl.setAttribute("icon", String(ic));
                else if (String(ic).match(/\.(svg|png|webp)$/i)) iconEl.setAttribute("src", String(ic));
              }
              if (ic) {
                var appIcon = document.querySelector('meta[name="app-icon"]');
                if (appIcon) appIcon.setAttribute("content", String(ic));
              }
            } catch (e) { /* ignore */ }
          })();
        </script>
        <div class="mimicus-app-boot__bar" aria-hidden="true"><span class="mimicus-app-boot__bar-fill"></span></div>
      </div>
      <img class="mimicus-app-boot-watermark" src="https://pub-1c290cc606c8478899f5764899278571.r2.dev/brand/logo-insoft.png" alt="" aria-hidden="true" decoding="async" />
    </div>
  </div>
</body>
</html>
