name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-mimicus-react
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build CDN + demo
        run: |
          npm ci
          npm run build
          npm run build:demo

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir demo estático
        uses: actions/upload-pages-artifact@v4
        with:
          path: demo

      - name: Publicar Pages
        id: deployment
        uses: actions/deploy-pages@v4
